services:
  # Public web service (backend API)
  - type: web
    name: patch-answer-service
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: patch-answer-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: patch-answer-kv
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: patch-answer-kv
          property: port

  # Private internal service (e.g. admin/ingestion)
  - type: web
    name: patch-answer-private
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: patch-answer-db
          property: connectionString
      - key: INTERNAL_ONLY
        value: "true"
    routes:
      - type: private

  # Background worker (for heavy async jobs)
  - type: worker
    name: patch-answer-worker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: patch-answer-db
          property: connectionString

  # Cron job (scheduled data refresh, etc.)
  - type: cron
    name: patch-answer-cron
    env: node
    schedule: "0 */6 * * *" # every 6 hours
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: patch-answer-db
          property: connectionString

  # Key-value store (Valkey/Redis-compatible)
  - type: keyvalue
    name: patch-answer-kv

# Postgres database for data lake
databases:
  - name: patch-answer-db
    databaseName: patch_answer
    plan: free
